<header class="page-navbar px-3 px-md-4 py-3 d-flex align-items-center justify-content-between">
    <div class="d-flex align-items-center gap-3">
        <!-- Mobile button -->
        <button
            class="btn navbar-toggle-btn d-lg-none"
            type="button"
            data-bs-toggle="offcanvas"
            data-bs-target="#sidebarCanvas"
            aria-controls="sidebarCanvas"
            aria-label="Ouvrir le menu"
        >
            <i class="bi bi-list"></i>
        </button>

        <!-- Title -->
        <div>
            <h1 class="h5 mb-0 fw-bold text-white">
                {{ page_title|default:"Dashboard" }}
            </h1>

            <small class="navbar-subtitle">
                Plateforme de pilotage <span>ServiceIT</span>
            </small>
        </div>
    </div>

    <!-- Right section -->
    <div class="d-flex align-items-center gap-3">
        {% if user.is_authenticated %}

            <div class="d-none d-md-flex flex-column align-items-end me-2">
                <span class="text-white small fw-semibold">
                    {{ user.get_full_name|default:user.username }}
                </span>

                <span class="navbar-role">
                    {{ user.role|default:"Technicien" }}
                </span>
            </div>

            <a href="{% url 'app:logout' %}" class="btn btn-sm navbar-btn navbar-btn-logout">
                <i class="bi bi-box-arrow-right me-1"></i> Déconnexion
            </a>

        {% else %}

            <a href="{% url 'app:login' %}" class="btn btn-sm navbar-btn navbar-btn-login">
                <i class="bi bi-box-arrow-in-right me-1"></i> Connexion
            </a>

        {% endif %}
    </div>
</header>
