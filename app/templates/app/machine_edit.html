{% extends 'app/base.html' %}
{% block title %}Modifier Machine | ServiceIT{% endblock %}

{% block content %}
<style>
    .machine-edit-page {
        color: var(--lux-text);
    }

    .form-shell {
        max-width: 860px;
        margin: 0 auto;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid var(--lux-border);
        border-radius: 24px;
        padding: 28px;
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.22);
    }

    .form-header {
        margin-bottom: 24px;
    }

    .form-title {
        margin: 0;
        font-size: 1.8rem;
        font-weight: 700;
        color: var(--lux-text);
    }

    .form-subtitle {
        margin: 8px 0 0;
        color: var(--lux-muted);
        font-size: 0.95rem;
    }

    .lux-label {
        color: #e2e6fa;
        font-weight: 600;
        margin-bottom: 8px;
    }

    .lux-input,
    .lux-select {
        background: rgba(255, 255, 255, 0.06) !important;
        border: 1px solid rgba(255, 255, 255, 0.08) !important;
        color: var(--lux-text) !important;
        border-radius: 16px !important;
        padding: 12px 14px !important;
        box-shadow: none !important;
    }

    .lux-input:focus,
    .lux-select:focus {
        border-color: rgba(142, 125, 255, 0.65) !important;
        box-shadow: 0 0 0 0.2rem rgba(142, 125, 255, 0.14) !important;
    }

    .lux-select option {
        background: #17171d;
        color: var(--lux-text);
    }

    .form-actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 12px;
    }

    .btn-lux-primary {
        background: linear-gradient(135deg, #8e7dff 0%, #a99cff 100%);
        color: #fff;
        border: none;
        border-radius: 999px;
        padding: 12px 22px;
        font-weight: 600;
        transition: all 0.25s ease;
    }

    .btn-lux-primary:hover {
        color: #fff;
        transform: translateY(-1px);
        box-shadow: 0 12px 26px rgba(142, 125, 255, 0.28);
    }

    .btn-lux-secondary {
        background: rgba(255, 255, 255, 0.04);
        color: var(--lux-text);
        border: 1px solid var(--lux-border);
        border-radius: 999px;
        padding: 12px 22px;
        text-decoration: none;
        font-weight: 500;
        transition: all 0.25s ease;
    }

    .btn-lux-secondary:hover {
        color: #fff;
        background: rgba(255, 255, 255, 0.08);
    }

    @media (max-width: 768px) {
        .form-shell {
            padding: 20px;
            border-radius: 20px;
        }

        .form-title {
            font-size: 1.45rem;
        }

        .form-actions > * {
            width: 100%;
            text-align: center;
        }
    }
</style>

<div class="machine-edit-page">
    <div class="form-shell">
        <div class="form-header">
            <h1 class="form-title">Modifier une machine</h1>
            <p class="form-subtitle">
                Mettez à jour les informations de la machine sélectionnée.
            </p>
        </div>

        <form method="post">
            {% csrf_token %}

            <div class="mb-3">
                <label for="nom" class="form-label lux-label">Nom de la machine</label>
                <input
                    type="text"
                    class="form-control lux-input"
                    id="nom"
                    name="nom"
                    value="{{ machine.nom }}"
                    required
                />
            </div>

            <div class="mb-3">
                <label for="type" class="form-label lux-label">Type</label>
                <select class="form-select lux-select" id="type" name="type" required>
                    <option value="ordinateur" {% if machine.type == 'ordinateur' %}selected{% endif %}>Ordinateur</option>
                    <option value="serveur" {% if machine.type == 'serveur' %}selected{% endif %}>Serveur</option>
                    <option value="imprimante" {% if machine.type == 'imprimante' %}selected{% endif %}>Imprimante</option>
                </select>
            </div>

            <div class="mb-4">
                <label for="statut" class="form-label lux-label">Statut</label>
                <select class="form-select lux-select" id="statut" name="statut" required>
                    <option value="actif" {% if machine.statut == 'actif' %}selected{% endif %}>Actif</option>
                    <option value="inactif" {% if machine.statut == 'inactif' %}selected{% endif %}>Inactif</option>
                    <option value="maintenance" {% if machine.statut == 'maintenance' %}selected{% endif %}>Maintenance</option>
                </select>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-lux-primary">Modifier</button>
                <a href="{% url 'app:machine_list' %}" class="btn-lux-secondary">Annuler</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
