{% extends 'app/base.html' %}
{% block title %}Modifier Intervention | ServiceIT{% endblock %}

{% block content %}
<style>
    .intervention-edit-page {
        color: var(--lux-text);
    }

    .form-shell {
        max-width: 900px;
        margin: 0 auto;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid var(--lux-border);
        border-radius: 24px;
        padding: 28px;
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.22);
    }

    .form-header {
        margin-bottom: 24px;
    }

    .form-title {
        margin: 0;
        font-size: 1.75rem;
        font-weight: 700;
        color: var(--lux-text);
    }

    .form-subtitle {
        margin: 8px 0 0;
        color: var(--lux-muted);
        font-size: 0.95rem;
    }

    .lux-label {
        color: #dfe3f8;
        font-weight: 600;
        margin-bottom: 8px;
    }

    .lux-input,
    .lux-select {
        background: rgba(255, 255, 255, 0.06) !important;
        border: 1px solid rgba(255, 255, 255, 0.08) !important;
        color: var(--lux-text) !important;
        border-radius: 16px !important;
        padding: 12px 14px !important;
        box-shadow: none !important;
    }

    .lux-input:focus,
    .lux-select:focus {
        border-color: rgba(142, 125, 255, 0.65) !important;
        box-shadow: 0 0 0 0.2rem rgba(142, 125, 255, 0.14) !important;
    }

    .lux-select option {
        background: #17171d;
        color: var(--lux-text);
    }

    .form-actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 10px;
    }

    .btn-lux-primary {
        background: linear-gradient(135deg, #8e7dff 0%, #a99cff 100%);
        color: #fff;
        border: none;
        border-radius: 999px;
        padding: 12px 22px;
        font-weight: 600;
        text-decoration: none;
        transition: all 0.25s ease;
    }

    .btn-lux-primary:hover {
        color: #fff;
        transform: translateY(-1px);
        box-shadow: 0 12px 26px rgba(142, 125, 255, 0.28);
    }

    .btn-lux-secondary {
        background: rgba(255, 255, 255, 0.04);
        color: var(--lux-text);
        border: 1px solid var(--lux-border);
        border-radius: 999px;
        padding: 12px 22px;
        font-weight: 500;
        text-decoration: none;
        transition: all 0.25s ease;
    }

    .btn-lux-secondary:hover {
        color: #fff;
        background: rgba(255, 255, 255, 0.08);
    }

    @media (max-width: 768px) {
        .form-shell {
            padding: 20px;
            border-radius: 20px;
        }

        .form-title {
            font-size: 1.45rem;
        }

        .form-actions > * {
            width: 100%;
            text-align: center;
        }
    }
</style>

<div class="intervention-edit-page">
    <div class="form-shell">
        <div class="form-header">
            <h1 class="form-title">Modifier une intervention</h1>
            <p class="form-subtitle">
                Mettez à jour les informations de l’intervention sélectionnée.
            </p>
        </div>

        <form method="post">
            {% csrf_token %}

            <div class="mb-3">
                <label for="machine" class="form-label lux-label">Machine</label>
                <select class="form-select lux-select" id="machine" name="machine" required>
                    <option value="">Sélectionner une machine</option>
                    {% for machine in machines %}
                        <option value="{{ machine.id }}" {% if intervention.machine.id == machine.id %}selected{% endif %}>
                            {{ machine.nom }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label for="type" class="form-label lux-label">Type d'intervention</label>
                <select class="form-select lux-select" id="type" name="type" required>
                    <option value="maintenance" {% if intervention.type == 'maintenance' %}selected{% endif %}>Maintenance</option>
                    <option value="reparation" {% if intervention.type == 'reparation' %}selected{% endif %}>Réparation</option>
                    <option value="installation" {% if intervention.type == 'installation' %}selected{% endif %}>Installation</option>
                </select>
            </div>

            <div class="mb-3">
                <label for="date" class="form-label lux-label">Date</label>
                <input
                    type="date"
                    class="form-control lux-input"
                    id="date"
                    name="date"
                    value="{{ intervention.date|date:'Y-m-d' }}"
                    required
                />
            </div>

            <div class="mb-4">
                <label for="technicien" class="form-label lux-label">Technicien</label>
                <select class="form-select lux-select" id="technicien" name="technicien" required>
                    <option value="">Sélectionner un technicien</option>
                    {% for technicien in techniciens %}
                        <option value="{{ technicien.id }}" {% if intervention.technicien.id == technicien.id %}selected{% endif %}>
                            {{ technicien.get_full_name|default:technicien.email }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-lux-primary">Modifier</button>
                <a href="{% url 'app:intervention_list' %}" class="btn-lux-secondary">Annuler</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
